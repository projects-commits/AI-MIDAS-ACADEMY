name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout Framework 9 Passos
        uses: actions/checkout@v4
        with:
          repository: aimidas1/Curso-Framework-9-Passos
          path: courses-framework

      - name: Checkout Vibe Coding
        uses: actions/checkout@v4
        with:
          repository: projects-commits/Curso-Vibe-Coding
          path: courses-vibe

      - name: Merge course content
        run: |
          mkdir -p site/src/content/courses
          mkdir -p site/src/content/courseLessons

          merge_repo () {
            local repo_path="$1"

            if [ -d "$repo_path/courses" ]; then
              cp -r "$repo_path/courses/"* "site/src/content/courses/" 2>/dev/null || true
            fi

            if [ -d "$repo_path/courseLessons" ]; then
              cp -r "$repo_path/courseLessons/"* "site/src/content/courseLessons/" 2>/dev/null || true
            fi

            if [ -d "$repo_path/src/content/courses" ]; then
              cp -r "$repo_path/src/content/courses/"* "site/src/content/courses/" 2>/dev/null || true
            fi

            if [ -d "$repo_path/src/content/courseLessons" ]; then
              cp -r "$repo_path/src/content/courseLessons/"* "site/src/content/courseLessons/" 2>/dev/null || true
            fi
          }

          merge_repo "courses-framework"
          merge_repo "courses-vibe"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
