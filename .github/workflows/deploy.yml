name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout do site (motor Astro)
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      # 2. Checkout do curso (conteúdo MDX) — repo noutra conta
      # Se o repo do curso for privado, descomenta a linha do token e
      # cria um secret COURSE_PAT em Settings > Secrets and variables > Actions
      - name: Checkout courses
        uses: actions/checkout@v4
        with:
          repository: aimidas1/Curso-Framework-9-Passos
          # token: ${{ secrets.COURSE_PAT }}
          path: courses

      # 3. Copiar o conteúdo do curso para dentro do site antes de compilar
      # NOTA: o repositorio externo aimidas1/Curso-Framework-9-Passos é usado como
      #       source-of-truth para o curso Framework 9 Passos. Se quiseres manter
      #       as imagens e import local (main repo), comenta as linhas do cp abaixo.
      - name: Merge course content
        run: |
          mkdir -p site/src/content/courses
          mkdir -p site/src/content/courseLessons
          # Copiar cursos do repo externo (excluir framework para nao sobrescrever local)
          if [ -d "courses/courses" ]; then
            for d in courses/courses/*/; do
              dirname=$(basename "$d")
              if [ "$dirname" != "framework-de-9-passos-para-analisar-um-jogo-de-futebol" ]; then
                cp -r "$d" "site/src/content/courses/$dirname" 2>/dev/null || true
              fi
            done
          fi
          if [ -d "courses/courseLessons" ]; then
            for d in courses/courseLessons/*/; do
              dirname=$(basename "$d")
              if [ "$dirname" != "framework-de-9-passos-para-analisar-um-jogo-de-futebol" ]; then
                cp -r "$d" "site/src/content/courseLessons/$dirname" 2>/dev/null || true
              fi
            done
          fi
          if [ -d "courses/src/content/courses" ]; then
            for d in courses/src/content/courses/*/; do
              dirname=$(basename "$d")
              if [ "$dirname" != "framework-de-9-passos-para-analisar-um-jogo-de-futebol" ]; then
                cp -r "$d" "site/src/content/courses/$dirname" 2>/dev/null || true
              fi
            done
          fi
          if [ -d "courses/src/content/courseLessons" ]; then
            for d in courses/src/content/courseLessons/*/; do
              dirname=$(basename "$d")
              if [ "$dirname" != "framework-de-9-passos-para-analisar-um-jogo-de-futebol" ]; then
                cp -r "$d" "site/src/content/courseLessons/$dirname" 2>/dev/null || true
              fi
            done
          fi

      # 4. Instalar dependências e fazer build do site
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      # 5. Enviar o resultado para o GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
